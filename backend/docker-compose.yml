# 在 backend 目录执行: docker compose up -d
# 主机用 5433，避免与本机 PostgreSQL（常占 5432）冲突；.env 里 DATABASE_URL 端口须为 5433

services:
  db:
    image: postgres:16-alpine
    container_name: kling-story-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kling_story
    ports:
      - "5433:5432"
    volumes:
      - kling_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kling_story"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kling_pg_data:
